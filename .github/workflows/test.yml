name: 파서 테스트

on:
  push:
    paths: ["scraper/**"]
  pull_request:
    paths: ["scraper/**"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -r scraper/requirements-dev.txt
      - name: 파서 테스트 (fixture, 네트워크 없음)
        run: cd scraper && python -m pytest tests/ -q
